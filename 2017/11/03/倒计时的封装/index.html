        <h1 id="倒计时"><a href="#倒计时" class="headerlink" title="倒计时"></a>倒计时</h1><p>简单的倒计时功能实现<br><a id="more"></a><br>    <figure class="highlight js"><table><tr><td class="gutter"><pre><span class="line">1</span><br><span class="line">2</span><br><span class="line">3</span><br><span class="line">4</span><br><span class="line">5</span><br><span class="line">6</span><br><span class="line">7</span><br><span class="line">8</span><br><span class="line">9</span><br><span class="line">10</span><br><span class="line">11</span><br><span class="line">12</span><br><span class="line">13</span><br><span class="line">14</span><br><span class="line">15</span><br><span class="line">16</span><br><span class="line">17</span><br><span class="line">18</span><br><span class="line">19</span><br><span class="line">20</span><br><span class="line">21</span><br><span class="line">22</span><br><span class="line">23</span><br><span class="line">24</span><br><span class="line">25</span><br><span class="line">26</span><br><span class="line">27</span><br><span class="line">28</span><br><span class="line">29</span><br><span class="line">30</span><br><span class="line">31</span><br><span class="line">32</span><br><span class="line">33</span><br><span class="line">34</span><br><span class="line">35</span><br><span class="line">36</span><br><span class="line">37</span><br><span class="line">38</span><br><span class="line">39</span><br><span class="line">40</span><br><span class="line">41</span><br><span class="line">42</span><br><span class="line">43</span><br><span class="line">44</span><br><span class="line">45</span><br><span class="line">46</span><br><span class="line">47</span><br><span class="line">48</span><br><span class="line">49</span><br><span class="line">50</span><br><span class="line">51</span><br><span class="line">52</span><br><span class="line">53</span><br><span class="line">54</span><br><span class="line">55</span><br></pre></td><td class="code"><pre><span class="line"></span><br><span class="line">(<span class="function"><span class="keyword">function</span>(<span class="params"></span>)</span>&#123;</span><br><span class="line">    <span class="function"><span class="keyword">function</span> <span class="title">countDown</span>(<span class="params">targetTime, timing, timend</span>) </span>&#123;</span><br><span class="line">        <span class="keyword">var</span> nowTime = <span class="keyword">new</span> <span class="built_in">Date</span>().getTime()</span><br><span class="line">        targetTime = <span class="keyword">new</span> <span class="built_in">Date</span>(targetTime).getTime()</span><br><span class="line">        <span class="keyword">var</span> timeRemaining = (+targetTime) - (+nowTime)</span><br><span class="line"></span><br><span class="line">        <span class="keyword">var</span> numberCountTest = <span class="function"><span class="keyword">function</span>(<span class="params">value</span>) </span>&#123;</span><br><span class="line">            <span class="keyword">var</span> numberTest = <span class="regexp">/^\d&#123;2&#125;$/</span></span><br><span class="line"></span><br><span class="line">            <span class="keyword">if</span>(numberTest.test(value)) &#123;</span><br><span class="line">                <span class="keyword">return</span> value</span><br><span class="line">            &#125; <span class="keyword">else</span> &#123;</span><br><span class="line">                <span class="keyword">return</span> <span class="string">'0'</span> + value</span><br><span class="line">            &#125;</span><br><span class="line">        &#125;</span><br><span class="line"></span><br><span class="line">        <span class="keyword">var</span> getDay = <span class="function"><span class="keyword">function</span>(<span class="params">millisecond</span>) </span>&#123;</span><br><span class="line">            <span class="keyword">return</span> numberCountTest(<span class="built_in">Math</span>.floor(millisecond / <span class="number">1000</span> / <span class="number">60</span> / <span class="number">60</span> / <span class="number">24</span>))</span><br><span class="line">        &#125;</span><br><span class="line"></span><br><span class="line">        <span class="keyword">var</span> getHours = <span class="function"><span class="keyword">function</span>(<span class="params">millisecond</span>) </span>&#123;</span><br><span class="line">            <span class="keyword">return</span> numberCountTest(<span class="built_in">Math</span>.floor(millisecond / <span class="number">1000</span> / <span class="number">60</span> / <span class="number">60</span> % <span class="number">24</span>))</span><br><span class="line">        &#125;</span><br><span class="line"></span><br><span class="line">        <span class="keyword">var</span> getMinute = <span class="function"><span class="keyword">function</span>(<span class="params">millisecond</span>) </span>&#123;</span><br><span class="line">            <span class="keyword">return</span> numberCountTest(<span class="built_in">Math</span>.floor(millisecond / <span class="number">1000</span> / <span class="number">60</span> % <span class="number">60</span>))</span><br><span class="line">        &#125;</span><br><span class="line"></span><br><span class="line">        <span class="keyword">var</span> getSecond = <span class="function"><span class="keyword">function</span>(<span class="params">millisecond</span>) </span>&#123;</span><br><span class="line">            <span class="keyword">return</span> numberCountTest(<span class="built_in">Math</span>.floor(millisecond / <span class="number">1000</span> % <span class="number">60</span>))</span><br><span class="line">        &#125;</span><br><span class="line"></span><br><span class="line">        <span class="keyword">var</span> timed = setInterval(<span class="function"><span class="keyword">function</span>(<span class="params"></span>) </span>&#123;</span><br><span class="line">            timeRemaining -= <span class="number">1000</span></span><br><span class="line">            <span class="keyword">if</span>(timeRemaining &lt;= <span class="number">0</span>) &#123;</span><br><span class="line">                clearInterval(timed)</span><br><span class="line">                timend()</span><br><span class="line">            &#125;<span class="keyword">else</span> &#123;</span><br><span class="line">                <span class="keyword">var</span> timeObj = &#123;</span><br><span class="line">                    day: getDay(timeRemaining),</span><br><span class="line">                    hours: getHours(timeRemaining),</span><br><span class="line">                    minute: getMinute(timeRemaining),</span><br><span class="line">                    second: getSecond(timeRemaining)</span><br><span class="line">                &#125;</span><br><span class="line">                timing(timeObj)</span><br><span class="line">            &#125;</span><br><span class="line">        &#125;, <span class="number">1000</span>)</span><br><span class="line">    &#125;</span><br><span class="line">    countDown(<span class="string">'2017/11/4 17:21:00'</span>, <span class="function"><span class="keyword">function</span>(<span class="params">timeObj</span>) </span>&#123;</span><br><span class="line">        <span class="comment">// console.log(timeObj.day, timeObj.hours, timeObj.minute, timeObj.second)</span></span><br><span class="line">    &#125;, <span class="function"><span class="keyword">function</span>(<span class="params"></span>) </span>&#123;</span><br><span class="line">        <span class="built_in">console</span>.log(<span class="string">'timed end'</span>)</span><br><span class="line">    &#125;)</span><br><span class="line">&#125;())</span><br></pre></td></tr></table></figure></p>
